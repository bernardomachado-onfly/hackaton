services:

  backend:
    build:
      context: ./backend
    container_name: hackaton-backend
    expose:
      - "3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ORIGINS: http://fingeseronfly.com.br,https://fingeseronfly.com.br,http://www.fingeseronfly.com.br,https://www.fingeseronfly.com.br,http://page.fingeseronfly.com.br,https://page.fingeseronfly.com.br
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://api.fingeseronfly.com.br
    container_name: hackaton-frontend
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  landing:
    build:
      context: ./landingpage
    container_name: hackaton-landing
    ports:
      - "3003:80"
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  npm_data:
  npm_letsencrypt:
